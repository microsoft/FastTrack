        function mcFilterPosts(posts, { category, severity, service, search } = {}) {
          return posts.filter(post => {
            if (category && category !== 'All' && post.category !== category) return false;
            if (severity && severity !== 'All' && post.severity.toLowerCase() !== severity.toLowerCase()) return false;
            if (service && service !== 'All' && !post.services.includes(service)) return false;
            if (search && search.trim()) {
              const q = search.trim().toLowerCase();
              const text = [post.id, post.title, post.summary, ...post.tags, ...post.services].join(' ').toLowerCase();
              if (!text.includes(q)) return false;
            }
            return true;
          });
        }

        function mcGetAlertNotifications(posts) {
          const today = new Date();
          const alertEnd = new Date(today);
          alertEnd.setDate(alertEnd.getDate() + 14);
          return posts.filter(post => {
            if (post.severity === 'high') return true;
            if (post.category === 'Action Required' && post.actionRequiredBy) {
              const due = new Date(post.actionRequiredBy);
              return due >= today && due <= alertEnd;
            }
            return false;
          });

                            <Zap className="w-5 h-5 text-red-600 dark:text-red-400" />
                            <span>Action Required & High Impact for {currentAgent.shortName}</span>
                            <span className="bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-200 px-2 py-0.5 rounded-full text-xs border border-red-200 dark:border-red-800">{mcAlertPosts.length}</span>
                          </div>
                        </div>
                        <div className="p-4 pt-0 grid gap-3 sm:grid-cols-2 lg:grid-cols-3 bg-red-50 dark:bg-red-950/20">
                          {mcAlertPosts.map((post) => (
                            <div
                              key={`alert-${post.id}`}
                              onClick={() => { toggleMcPost(post.id); }}
                              className="bg-white dark:bg-white/[0.06] p-3 rounded-lg border border-red-100 dark:border-red-900/30 shadow-sm hover:shadow-md hover:border-red-300 dark:hover:border-red-700 transition-all cursor-pointer relative overflow-hidden"
                            >
                              <div className="absolute top-0 left-0 w-1 h-full bg-red-50 dark:bg-red-500/20"></div>
                              <div className="flex justify-between items-start gap-2 mb-2 pl-2">
                                <span className="text-xs font-mono text-gray-400 dark:text-gray-500 bg-gray-50 dark:bg-white/[0.03] px-1.5 rounded border border-gray-100 dark:border-white/[0.08]">{post.id}</span>
                                {post.severity === 'high' && (
                                  <span className="flex h-2 w-2 rounded-full bg-red-500 ring-2 ring-red-100 dark:ring-red-900"></span>
                                )}
                              </div>
                              <h4 className="text-sm font-semibold text-gray-900 dark:text-white leading-snug pl-2 hover:text-blue-600 dark:hover:text-blue-400 transition-colors line-clamp-2">{post.title}</h4>
                              {post.actionRequiredBy && (
                                <div className="mt-2 ml-2 flex items-center gap-2 text-xs text-red-600 dark:text-red-300 font-medium bg-red-50 dark:bg-red-950/30 w-fit px-2 py-1 rounded">
                                  <Clock className="w-3 h-3" />
                                  Action by {new Date(post.actionRequiredBy).toLocaleDateString()} ({Math.ceil((new Date(post.actionRequiredBy) - new Date()) / (1000 * 60 * 60 * 24))}d)
                                </div>
                              )}
                              {!post.actionRequiredBy && (
                                <div className="mt-2 ml-2 flex items-center gap-2 text-xs text-red-600 dark:text-red-300 font-medium bg-red-50 dark:bg-red-950/30 w-fit px-2 py-1 rounded">
                                  <Clock className="w-3 h-3" />
                                  Immediate attention
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Filter Bar */}
                    <div className="bg-gray-50 dark:bg-black/50 p-4 rounded-xl border border-gray-200 dark:border-white/[0.08] mb-6 space-y-4">
                      <div className="flex flex-col md:flex-row gap-4">
                        <div className="relative flex-1">
                          <Search className="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500" />
                          <input
                            type="text"
                            placeholder="Search by ID, title, or keyword..."
                            className="w-full pl-9 pr-4 py-2 bg-white dark:bg-white/[0.03] border border-gray-200 dark:border-white/[0.08] rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all dark:text-white dark:placeholder-gray-500"
                            value={mcSearch}
                            onChange={(e) => setMcSearch(e.target.value)}
                          />
                        </div>
                        <select
                          className="appearance-none bg-white dark:bg-white/[0.03] border border-gray-200 dark:border-white/[0.08] text-gray-700 dark:text-gray-200 py-2 pl-3 pr-8 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer hover:border-gray-300 dark:hover:border-white/[0.15]"
                          value={mcService}
                          onChange={(e) => setMcService(e.target.value)}
                        >
                          <option value="All">All Services</option>
                          {mcAvailableServices.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                      </div>
                      <div className="h-px bg-gray-200 dark:bg-white/[0.06]"></div>
                      <div className="flex flex-col md:flex-row gap-4 justify-between items-start md:items-center">
                        <div className="flex flex-wrap gap-2">
                          {['All', 'Plan for Change', 'Stay Informed', 'Prevent or Fix Issues', 'Action Required'].map(cat => (
                            <button
                              key={cat}
                              onClick={() => setMcCategory(cat)}
                              className={`px-3 py-1.5 rounded-full text-xs font-medium transition-all border ${
                                mcCategory === cat
                                  ? 'bg-blue-600 border-blue-600 text-white shadow-sm'
                                  : 'bg-white dark:bg-white/[0.03] border-gray-200 dark:border-white/[0.08] text-gray-600 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/[0.08] hover:border-gray-300 dark:hover:border-white/[0.15]'
                              }`}
                            >
                              {cat}
                            </button>
                          ))}
                        </div>
                        <div className="flex items-center gap-1 bg-white dark:bg-white/[0.03] border border-gray-200 dark:border-white/[0.08] rounded-lg px-2 py-1.5">
                          <span className="text-xs text-gray-500 dark:text-gray-400 font-medium px-1">Severity:</span>
                          {['All', 'High', 'Medium', 'Low'].map((sev) => (
                            <button
                              key={sev}
                              onClick={() => setMcSeverity(sev)}
                              className={`px-2.5 py-1 rounded text-xs font-medium transition-colors flex items-center gap-1.5 ${
                                mcSeverity === sev ? 'bg-gray-800 dark:bg-white/[0.1] text-white' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-white/[0.08]'
                              }`}
                              title={sev}
                            >
                              {sev !== 'All' && <span className={`w-1.5 h-1.5 rounded-full ${getMcSeverityColor(sev.toLowerCase())}`}></span>}
                              {sev}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Active Filters */}
                      {(mcCategory !== 'All' || mcSeverity !== 'All' || mcService !== 'All' || mcSearch) && (
                        <div className="flex items-center gap-2 text-xs text-gray-500 dark:text-gray-400 pt-2">
                          <span className="font-medium">Active filters:</span>
                          {mcCategory !== 'All' && (
                            <span className="bg-blue-50 dark:bg-blue-950/20 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded border border-blue-100 dark:border-blue-900/30 flex items-center gap-1">
                              {mcCategory}
                              <button onClick={() => setMcCategory('All')} className="hover:text-blue-900 dark:hover:text-blue-200"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcSeverity !== 'All' && (
                            <span className="bg-blue-50 dark:bg-blue-950/20 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded border border-blue-100 dark:border-blue-900/30 flex items-center gap-1">
                              {mcSeverity} Severity
                              <button onClick={() => setMcSeverity('All')} className="hover:text-blue-900 dark:hover:text-blue-200"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcService !== 'All' && (
                            <span className="bg-blue-50 dark:bg-blue-950/20 text-blue-700 dark:text-blue-300 px-2 py-0.5 rounded border border-blue-100 dark:border-blue-900/30 flex items-center gap-1">
                              Service: {mcService}
                              <button onClick={() => setMcService('All')} className="hover:text-blue-900 dark:hover:text-blue-200"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcSearch && <span className="bg-yellow-50 dark:bg-yellow-950/20 text-yellow-700 dark:text-yellow-300 px-2 py-0.5 rounded border border-yellow-100 dark:border-yellow-900/30">Search: "{mcSearch}"</span>}
                          <button onClick={() => { setMcCategory('All'); setMcSeverity('All'); setMcService('All'); setMcSearch(''); }} className="ml-auto text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 underline decoration-dotted">Clear all</button>
                        </div>
                      )}
                      
                      <div className="text-right text-xs text-gray-400 dark:text-gray-500 mt-2">
                        Showing {mcFiltered.length} of {mcAgentFiltered.length} posts
                      </div>
                    </div>

                    {/* Posts List */}
                    <div className="space-y-4">
                      {mcFiltered.length === 0 ? (
                        <div className="text-center py-16 rounded-xl border border-dashed border-gray-300 dark:border-white/[0.08]">
                          <div className="bg-gray-50 dark:bg-white/[0.06] w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Check className="w-8 h-8 text-green-500" />
                          </div>
                          <h3 className="text-lg font-medium text-gray-900 dark:text-white">All caught up!</h3>
                          <p className="text-gray-500 dark:text-gray-400 mt-1 max-w-sm mx-auto">
                            No message center posts found for <span className="font-semibold">{currentAgent.name}</span> matching your current filters.
                          </p>
                          <button onClick={() => { setMcCategory('All'); setMcSeverity('All'); setMcService('All'); setMcSearch(''); }} className="mt-4 text-blue-600 font-medium hover:text-blue-700 text-sm">Clear filters to see all posts</button>
                        </div>
                      ) : (
                        mcFiltered.map((post) => {
                          const isExpanded = mcExpandedPosts[post.id];
                          const isImportant = post.severity === 'high' || post.category === 'Action Required';
                          const badgeStyle = getMcBadgeStyle(post.category);
                          const sevColor = getMcSeverityColor(post.severity);
                          return (
                            <div
                              key={post.id}
                              className={`bg-white dark:bg-white/[0.03] rounded-xl border transition-all duration-200 overflow-hidden border-gray-200 dark:border-white/[0.08] ${
                                isExpanded ? 'ring-2 ring-blue-500/20 shadow-md' : 'hover:shadow-md hover:border-gray-300 dark:hover:border-white/[0.1]'
                              } ${
                                isImportant
                                  ? post.severity === 'high' ? 'border-l-4 border-l-red-500' : 'border-l-4 border-l-amber-500'
                                  : 'border-l-4 border-l-transparent dark:border-l-transparent'
                              }`}
                            >
                              <div className="p-5 cursor-pointer" onClick={() => toggleMcPost(post.id)}>
                                <div className="flex items-start justify-between gap-4">
                                  <div className="flex-1 space-y-2">
                                    <div className="flex flex-wrap items-center gap-2">
                                      <span className={`px-2.5 py-0.5 rounded-md text-xs font-medium border ${badgeStyle}`}>{post.category}</span>
                                      <span className={`flex items-center gap-1 text-xs px-2 py-0.5 rounded-full ${
                                        post.severity === 'high' ? 'bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300' : post.severity === 'medium' ? 'bg-yellow-100 text-yellow-700 dark:bg-yellow-900/30 dark:text-yellow-300' : 'bg-gray-100 text-gray-600 dark:bg-white/[0.06] dark:text-gray-400'
                                      }`}>
                                        <span className={`w-1.5 h-1.5 rounded-full ${sevColor}`}></span>
                                        <span className="capitalize">{post.severity}</span>
                                      </span>
                                      <span className="text-xs font-mono text-gray-400 dark:text-gray-500">{post.id}</span>
                                      <span className="text-xs text-gray-400 dark:text-gray-500 flex items-center gap-1">
                                        <Calendar className="w-3 h-3" />
                                        {new Date(post.datePublished).toLocaleDateString()}
                                      </span>
                                      {post.isHighImpact && (
                                        <span className="bg-red-50 dark:bg-red-950/20 text-red-700 dark:text-red-300 px-1.5 py-0.5 rounded text-[10px] border border-red-200 dark:border-red-900/30 font-semibold">⚡ High Impact</span>
                                      )}
                                    </div>
                                    <h3 className={`text-base font-semibold leading-snug ${isExpanded ? 'text-blue-700 dark:text-blue-400' : 'text-gray-900 dark:text-white'}`}>{post.title}</h3>
                                    <div className="flex flex-wrap items-center gap-2 text-xs text-gray-500 dark:text-gray-400">
                                      {post.services.map(svc => (
                                        <span key={svc} className="bg-gray-100 dark:bg-white/[0.06] text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded text-[10px] border border-gray-200 dark:border-white/[0.08]">{svc}</span>
                                      ))}
                                      {post.tags.slice(0, 2).map(tag => (
                                        <span key={tag} className="text-gray-400 dark:text-gray-500 italic">#{tag}</span>
                                      ))}
                                      {post.tags.length > 2 && <span className="text-gray-400 dark:text-gray-500">+{post.tags.length - 2}</span>}
                                    </div>
                                  </div>
                                  <div className={`p-1 rounded-full hover:bg-gray-100 dark:hover:bg-white/[0.08] text-gray-400 dark:text-gray-500 transition-transform duration-200 flex-shrink-0 ${isExpanded ? 'rotate-180' : ''}`}>
                                    <ChevronDown className="w-5 h-5" />
                                  </div>
                                </div>
                                {post.actionRequiredBy && (
                                  <div className="mt-3 bg-amber-50 dark:bg-amber-950/20 border border-amber-100 dark:border-amber-900/30 rounded-lg p-2 flex items-center gap-2 text-xs text-amber-800 dark:text-amber-200 w-fit">
                                    <Clock className="w-3.5 h-3.5 text-amber-600 dark:text-amber-400" />
                                    <span className="font-semibold">Action Required by: {new Date(post.actionRequiredBy).toLocaleDateString()}</span>
                                    <span className="text-amber-600/70 dark:text-amber-400/70 border-l border-amber-200 dark:border-amber-800 pl-2 ml-1">
                                      {Math.ceil((new Date(post.actionRequiredBy) - new Date()) / (1000 * 60 * 60 * 24))} days remaining
                                    </span>
                                  </div>
                                )}
                              </div>
                              {isExpanded && (
                                <div className="border-t border-gray-100 dark:border-white/[0.08] bg-gray-50 dark:bg-black/50 p-5">
                                  <p className="text-sm text-gray-600 dark:text-gray-300 leading-relaxed">{post.summary}</p>
                                  <div className="flex flex-wrap items-center justify-between gap-4 mt-4 pt-4 border-t border-gray-200 dark:border-white/[0.08]">
                                    <div className="flex flex-wrap gap-1.5">
                                      {post.tags.map(tag => (
                                        <span key={tag} className="text-xs px-2 py-1 bg-white dark:bg-white/[0.03] border border-gray-200 dark:border-white/[0.08] rounded text-gray-500 dark:text-gray-400">#{tag}</span>
                                      ))}
                                    </div>
                                    <a
                                      href="https://admin.microsoft.com/Adminportal/Home?#/MessageCenter"
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      className="inline-flex items-center gap-2 px-4 py-2 bg-white dark:bg-white/[0.03] border border-gray-300 dark:border-white/[0.08] rounded-lg text-sm font-medium text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-white/[0.08] hover:text-gray-900 dark:hover:text-white transition-colors shadow-sm"
                                    >
                                      View in Admin Center
                                      <ExternalLink className="w-3.5 h-3.5" />
                                    </a>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                )}

                {/* Footer */}
                <div className="text-center mt-12 py-6 border-t border-gray-100 dark:border-white/[0.08]">
                  <p className="text-gray-400 dark:text-gray-500 text-sm mb-2">
                    Microsoft Copilot Agents Guide • 2026
                  </p>
                  <div className="flex items-center justify-center gap-3 text-xs text-gray-400 dark:text-gray-500">
                    <a 
                      href="https://learn.microsoft.com/en-us/microsoft-365/fasttrack/microsoft-365-copilot#microsoft-365-copilot-extensibility"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="inline-flex items-center gap-1.5 hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
                    >
                      <Zap className="w-3 h-3" />
                      FastTrack Service Description
                    </a>
                    <span className="text-gray-200 dark:text-gray-700">·</span>
                    <a 
                      href="https://github.com/microsoft/FastTrack"
                      target="_blank"
                      rel="noopener noreferrer"
                      className="hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
                    >
                      GitHub
                    </a>
                    <span className="text-gray-200 dark:text-gray-700">·</span>
                    <a 
                      href="mailto:ftgithub@microsoft.com"
                      className="hover:text-gray-600 dark:hover:text-gray-300 transition-colors"
                    >
                      Contact
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
          );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CopilotAgentsGuide />);
    </script>
</body>
</html>
