name: Update Message Center Posts

on:
  schedule:
    # Runs every Monday at 7:00 AM UTC
    - cron: '0 7 * * 1'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-message-center
  cancel-in-progress: false

jobs:
  update-message-center:
    # Only run on the canonical upstream repo, not on forks.
    # Mirrors the guard used by traffic-stats.yml so forks skip cleanly
    # instead of failing when repo-specific secrets are unavailable.
    if: github.repository == 'microsoft/FastTrack'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: '22'

      - name: Update message center posts
        run: node scripts/update-message-center.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet copilot-agent-strategy/copilot-agents-guide/index.html && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          # Use the built-in GITHUB_TOKEN. The job already grants
          # contents:write + pull-requests:write, which is sufficient to push
          # the branch and open the PR without a separate long-lived PAT.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add copilot-agent-strategy/copilot-agents-guide/index.html

          DATE=$(date -u +%Y-%m-%d)
          BRANCH="message-center/$DATE"

          git checkout -b "$BRANCH"
          git commit -m "chore: weekly message center posts refresh $DATE"
          git push --set-upstream origin "$BRANCH"

          # Create a normal PR for human review if one doesn't already exist.
          existing_pr=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists for $BRANCH"
          else
            gh pr create \
              --title "chore: weekly message center posts refresh $DATE" \
              --body "Automated weekly message center data update. This PR contains externally derived content and requires human review." \
              --head "$BRANCH" \
              --base master
            echo "✅ PR created"
          fi
