mcs.metadata:
  componentName: Log Chain of Thoughts
kind: AdaptiveDialog
inputs:
  - kind: AutomaticTaskInput
    propertyName: CoT
    description: Full intermediate chain of thought / rationale from the model for the current step. Include what you just did, what you learned, and what you plan to do next.
    entity: StringPrebuiltEntity
    shouldPromptUser: false

modelDescription: Logs the orchestrator's intermediate reasoning steps during multi-tool or multi-step operations. Called automatically by the orchestrator after each step to surface chain-of-thought progress to the user.
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Log Chain of Thoughts
    triggerQueries:
      - Log chain of thoughts
      - Show reasoning
      - Show your work

  actions:
    - kind: SendActivity
      id: sendMessage_Xt9kR2
      activity: "*💭 {Topic.CoT}*"

inputType:
  properties:
    CoT:
      displayName: CoT
      description: Full intermediate chain of thought / rationale from the model for the current step.
      type: String

outputType: {}