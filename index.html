        function mcFilterPosts(posts, { category, severity, service, search } = {}) {

            if (category && category !== 'All' && post.category !== category) return false;
            if (severity && severity !== 'All' && post.severity.toLowerCase() !== severity.toLowerCase()) return false;
            if (service && service !== 'All' && !post.services.includes(service)) return false;

              const text = [post.id, post.title, post.summary, ...post.tags, ...post.services].join(' ').toLowerCase();
              if (!text.includes(q)) return false;
            }
            return true;
          });

              return due >= today && due <= alertEnd;
            }

                              title={sev}
                            >
                              {sev !== 'All' && <span className={`w-1.5 h-1.5 rounded-full ${getMcSeverityColor(sev.toLowerCase())}`}></span>}
                              {sev}
                            </button>
                          ))}
                        </div>
                      </div>

                      {/* Active Filters */}
                      {(mcCategory !== 'All' || mcSeverity !== 'All' || mcService !== 'All' || mcSearch) && (
                        <div className="flex items-center gap-2 text-xs text-gray-500 pt-2">
                          <span className="font-medium">Active filters:</span>
                          {mcCategory !== 'All' && (
                            <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded border border-blue-100 flex items-center gap-1">
                              {mcCategory}
                              <button onClick={() => setMcCategory('All')} className="hover:text-blue-900"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcSeverity !== 'All' && (
                            <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded border border-blue-100 flex items-center gap-1">
                              {mcSeverity} Severity
                              <button onClick={() => setMcSeverity('All')} className="hover:text-blue-900"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcService !== 'All' && (
                            <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded border border-blue-100 flex items-center gap-1">
                              Service: {mcService}
                              <button onClick={() => setMcService('All')} className="hover:text-blue-900"><X className="w-3 h-3" /></button>
                            </span>
                          )}
                          {mcSearch && <span className="bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded border border-yellow-100">Search: "{mcSearch}"</span>}
                          <button onClick={() => { setMcCategory('All'); setMcSeverity('All'); setMcService('All'); setMcSearch(''); }} className="ml-auto text-gray-400 hover:text-gray-600 underline decoration-dotted">Clear all</button>
                        </div>
                      )}
                      
                      <div className="text-right text-xs text-gray-400 mt-2">
                        Showing {mcFiltered.length} of {mcAgentFiltered.length} posts
                      </div>
                    </div>

                    {/* Posts List */}
                    <div className="space-y-4">
                      {mcFiltered.length === 0 ? (
                        <div className="text-center py-16 rounded-xl border border-dashed border-gray-300">
                          <div className="bg-gray-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Check className="w-8 h-8 text-green-500" />
                          </div>
                          <h3 className="text-lg font-medium text-gray-900">All caught up!</h3>
                          <p className="text-gray-500 mt-1 max-w-sm mx-auto">
                            No message center posts found for <span className="font-semibold">{currentAgent.name}</span> matching your current filters.
                          </p>
                          <button onClick={() => { setMcCategory('All'); setMcSeverity('All'); setMcService('All'); setMcSearch(''); }} className="mt-4 text-blue-600 font-medium hover:text-blue-700 text-sm">Clear filters to see all posts</button>
                        </div>
                      ) : (
                        mcFiltered.map((post) => {
                          const isExpanded = mcExpandedPosts[post.id];
                          const isImportant = post.severity === 'high' || post.category === 'Action Required';
                          const badgeStyle = getMcBadgeStyle(post.category);
                          const sevColor = getMcSeverityColor(post.severity);
                          return (
                            <div
                              key={post.id}
                              className={`bg-white rounded-xl border transition-all duration-200 overflow-hidden border-gray-200 ${
                                isExpanded ? 'ring-2 ring-blue-500/20 shadow-md' : 'hover:shadow-md hover:border-gray-300'
                              } ${
                                isImportant
                                  ? post.severity === 'high' ? 'border-l-4 border-l-red-500' : 'border-l-4 border-l-amber-500'
                                  : 'border-l-4 border-l-transparent'
                              }`}
                            >
                              <div className="p-5 cursor-pointer" onClick={() => toggleMcPost(post.id)}>
                                <div className="flex items-start justify-between gap-4">
                                  <div className="flex-1 space-y-2">
                                    <div className="flex flex-wrap items-center gap-2">
                                      <span className={`px-2.5 py-0.5 rounded-md text-xs font-medium border ${badgeStyle}`}>{post.category}</span>
                                      <span className={`flex items-center gap-1 text-xs px-2 py-0.5 rounded-full ${
                                        post.severity === 'high' ? 'bg-red-100 text-red-700' : post.severity === 'medium' ? 'bg-yellow-100 text-yellow-700' : 'bg-gray-100 text-gray-600'
                                      }`}>
                                        <span className={`w-1.5 h-1.5 rounded-full ${sevColor}`}></span>
                                        <span className="capitalize">{post.severity}</span>
                                      </span>
                                      <span className="text-xs font-mono text-gray-400">{post.id}</span>
                                      <span className="text-xs text-gray-400 flex items-center gap-1">
                                        <Calendar className="w-3 h-3" />
                                        {new Date(post.datePublished).toLocaleDateString()}
                                      </span>
                                      {post.isHighImpact && (
                                        <span className="bg-red-50 text-red-700 px-1.5 py-0.5 rounded text-[10px] border border-red-200 font-semibold">⚡ High Impact</span>
                                      )}
                                    </div>
                                    <h3 className={`text-base font-semibold leading-snug ${isExpanded ? 'text-blue-700' : 'text-gray-900'}`}>{post.title}</h3>
                                    <div className="flex flex-wrap items-center gap-2 text-xs text-gray-500">
                                      {post.services.map(svc => (
                                        <span key={svc} className="bg-gray-100 text-gray-600 px-1.5 py-0.5 rounded text-[10px] border border-gray-200">{svc}</span>
                                      ))}
                                      {post.tags.slice(0, 2).map(tag => (
                                        <span key={tag} className="text-gray-400 italic">#{tag}</span>
                                      ))}
                                      {post.tags.length > 2 && <span className="text-gray-400">+{post.tags.length - 2}</span>}
                                    </div>
                                  </div>
                                  <div className={`p-1 rounded-full hover:bg-gray-100 text-gray-400 transition-transform duration-200 flex-shrink-0 ${isExpanded ? 'rotate-180' : ''}`}>
                                    <ChevronDown className="w-5 h-5" />
                                  </div>
                                </div>
                                {post.actionRequiredBy && (
                                  <div className="mt-3 bg-amber-50 border border-amber-100 rounded-lg p-2 flex items-center gap-2 text-xs text-amber-800 w-fit">
                                    <Clock className="w-3.5 h-3.5 text-amber-600" />
                                    <span className="font-semibold">Action Required by: {new Date(post.actionRequiredBy).toLocaleDateString()}</span>
                                    <span className="text-amber-600/70 border-l border-amber-200 pl-2 ml-1">
                                      {Math.ceil((new Date(post.actionRequiredBy) - new Date()) / (1000 * 60 * 60 * 24))} days remaining
                                    </span>
                                  </div>
                                )}
                              </div>
                              {isExpanded && (
                                <div className="border-t border-gray-100 bg-gray-50/50 p-5">
                                  <p className="text-sm text-gray-600 leading-relaxed">{post.summary}</p>
                                  <div className="flex flex-wrap items-center justify-between gap-4 mt-4 pt-4 border-t border-gray-200">
                                    <div className="flex flex-wrap gap-1.5">
                                      {post.tags.map(tag => (
                                        <span key={tag} className="text-xs px-2 py-1 bg-white border border-gray-200 rounded text-gray-500">#{tag}</span>
                                      ))}
                                    </div>
                                    <a
                                      href="https://admin.microsoft.com/Adminportal/Home?#/MessageCenter"
                                      target="_blank"
                                      rel="noopener noreferrer"
                                      className="inline-flex items-center gap-2 px-4 py-2 bg-white border border-gray-300 rounded-lg text-sm font-medium text-gray-700 hover:bg-gray-50 hover:text-gray-900 transition-colors shadow-sm"
                                    >
                                      View in Admin Center
                                      <ExternalLink className="w-3.5 h-3.5" />
                                    </a>
                                  </div>
                                </div>
                              )}
                            </div>
                          );
                        })
                      )}
                    </div>
                  </div>
                )}

                {/* Footer - Subtle FastTrack Reference */}
                <div className="text-center mt-8 py-6 border-t border-gray-200">
                  <p className="text-gray-500 text-sm mb-2">
                    Microsoft Copilot Agents Guide • Updated for 2026
                  </p>
                  <p className="text-gray-400 text-xs mb-2">
                    <span className="inline-flex items-center gap-1">
                      <Zap className="w-3 h-3" />
                      FastTrack = FastTrack deployment support available (5 of 6 agent types). Agent 365 governance FastTrack support coming soon.
                    </span>
                  </p>
                  <a 
                    href="https://learn.microsoft.com/en-us/microsoft-365/fasttrack/microsoft-365-copilot#microsoft-365-copilot-extensibility"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-blue-600 transition-colors"
                  >
                    <ExternalLink className="w-3 h-3" />
                    FastTrack Service Description
                  </a>
                  <span className="mx-2 text-gray-300">|</span>
                  <a 
                    href="https://github.com/microsoft/FastTrack"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="inline-flex items-center gap-1 text-xs text-gray-500 hover:text-blue-600 transition-colors"
                  >
                    <Code className="w-3 h-3" />
                    GitHub Repository
                  </a>
                </div>
              </div>
            </div>
          );
        };

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<CopilotAgentsGuide />);
    </script>
</body>
</html>
